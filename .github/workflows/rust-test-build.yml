name: Full Project CI Pipeline

on: [push, pull_request]

jobs:
    # --- PHASE 1: LINTING & FORMATTING (All run in parallel) ---
    makefile-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install mbake
              run: pip install mbake

            - name: Lint Makefile
              run: mbake validate Makefile

            - name: Check Makefile format
              run: mbake format --check Makefile

            - name: Install actionlint
              run: |
                  wget https://github.com/rhysd/actionlint/releases/download/v1.6.7/actionlint_1.6.7_linux_amd64.tar.gz
                  tar xvfz actionlint_1.6.7_linux_amd64.tar.gz
                  sudo mv actionlint /usr/local/bin/

            - name: Lint GitHub Actions
              run: actionlint

            - name: Install typos-cli
              run: cargo install typos-cli

            - name: Check for typos
              run: typos

    rust-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./rust
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "rust -> target"
            - name: Install taplo-cli
              run: cargo install taplo-cli
            - name: Check Rust format (rustfmt)
              run: cargo fmt --check
            - name: Check TOML format (taplo)
              run: taplo fmt --check
            - name: Run Clippy
              run: cargo clippy --all-targets --all-features -- -D warnings

    python-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Ruff lint
              uses: astral-sh/ruff-action@v3
              with:
                  src: "./python-gui"
            - name: Ruff format check
              uses: astral-sh/ruff-action@v3
              with:
                  src: "./python-gui"
                  args: "format --check"

    frontend-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./frontend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - name: Install Node.js dependencies
              run: npm install
            - name: HTMLHint
              run: npx htmlhint "**/*.html"
            - name: Stylelint
              run: npx stylelint "**/*.css"
            - name: Prettier check
              run: npx prettier --check "**/*.{html,css,js,json}"

    # --- PHASE 2: RUST TEST & BUILD (parallel, all need rust-lint) ---

    cargo-test:
        needs: [rust-lint]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./rust
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "rust -> target"
            - run: cargo test --verbose

    cargo-build:
        needs: [rust-lint]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./rust
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "rust -> target"
            - run: cargo build --release --verbose

    # --- PHASE 3: PYTHON GUI BUILD & RUN ---

    python-build:
        needs: [python-lint]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./python-gui
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install system deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y python3-tk xvfb
            - name: Run headless GUI smoke test
              run: xvfb-run timeout 10 python main.py || true
