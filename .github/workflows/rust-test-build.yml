name: Full Project CI Pipeline

on: [push, pull_request]

jobs:
    # --- PHASE 1: LINTING & FORMATTING (All run in parallel) ---

    rust-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./rust
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
              with:
                  components: rustfmt, clippy
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "rust -> target"
            - name: Check Format
              run: cargo fmt --check
            - name: Run Clippy
              run: cargo clippy --all-targets -- -D warnings
            # cargo check removed — redundant with test/build jobs below

    # Consolidated: ruff + black in one job (saves a checkout + python setup)
    python-lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Ruff lint
              uses: astral-sh/ruff-action@v3
              with:
                  src: "./python-gui"
            - name: Black format check
              working-directory: ./python-gui
              run: |
                  pip install black
                  black --check .

    # Consolidated: htmlhint + stylelint + prettier in one job (saves 2 checkouts)
    frontend-lint:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./frontend
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - name: Install lint tools
              run: npm install -g htmlhint stylelint stylelint-config-standard prettier
            - name: HTMLHint
              run: htmlhint "**/*.html"
            - name: Stylelint
              run: npx stylelint "**/*.css"
            - name: Prettier
              run: npx prettier --check "**/*.{html,css,js,json}"

    # --- PHASE 2: RUST TEST & BUILD (parallel, both need rust-lint) ---

    cargo-test:
        needs: [rust-lint]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./rust
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "rust -> target"
            - run: cargo test --verbose

    cargo-build:
        needs: [rust-lint]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./rust
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - uses: Swatinem/rust-cache@v2
              with:
                  workspaces: "rust -> target"
            - run: cargo build --release --verbose

    # --- PHASE 3: PYTHON GUI BUILD & RUN ---

    python-build:
        needs: [python-lint]
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./python-gui
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install system deps
              run: |
                  sudo apt-get update
                  sudo apt-get install -y python3-tk xvfb
            - name: Install Python deps
              run: |
                  pip install --upgrade pip
                  # Install from requirements.txt if you have one, otherwise just direct deps:
                  pip install -r requirements.txt  # or: pip install requests httpx etc.
            - name: Run headless GUI smoke test
              run: xvfb-run python main.py
